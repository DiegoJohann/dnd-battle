<div class="grid" [@listAnim]>
    @for (combatant of combatants; track combatant.id) {
        <app-combatant-card
            [combatant]="combatant"
            (damage)="applyDamage(combatant, $event)"
            (healing)="applyHealing(combatant, $event)"
            (remove)="onClickRemoveCombatant(combatant)"
            (initiativeChange)="updateInitiative(combatant, $event)"
        />
    }
</div>

<button
    class="add-btn"
    [class.pulse]="combatants.length === 0"
    (click)="openAddCombatantModal()"
>
    <lucide-icon [img]="PlusIcon" [size]="18"></lucide-icon>
    <span class="label">Adicionar combatente</span>
</button>

<button class="clear-btn" (click)="openClearFieldModal()">
    <lucide-icon [img]="Trash2Icon" [size]="14"></lucide-icon>
    Limpar
</button>

@if (showAddCombatantModal) {
    <app-add-combatant-modal
        (close)="closeAddCombatantModal()"
        (create)="addCombatant($event)"
    />
}

@if (showClearFieldModal) {
    <div class="overlay">
        <div class="modal">
            <h2>Limpar campo de batalha</h2>
            <p>O que você deseja excluir?</p>

            <div class="actions">
                <button (click)="clearCombatants('NPC')">Somente NPCs</button>
                <button (click)="clearCombatants('PLAYER')">Somente Jogadores</button>
                <button (click)="clearCombatants('ALL')">Todos</button>
                <button (click)="closeClearFieldModal()">Cancelar</button>
            </div>
        </div>
    </div>
}

@if (showConfirmationDialog) {
    <app-confirmation-dialog
        [confimationMessage]="'Tem certeza de que deseja remover este combatente?'"
        (actionConfirmed)="removeCombatant()"
        (actionRejected)="this.showConfirmationDialog = false; this.combatantToRemove = undefined;"
    ></app-confirmation-dialog>
}
